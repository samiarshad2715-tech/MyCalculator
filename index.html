<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SamiCalc - A Calculator</title>
    <meta name="SamiCalc" content="Use for simple Arithmetiic calculations">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=League+Spartan:wght@100..900&family=Orbitron:wght@400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <div class="heading">SamiCalc</div>
    </header>

    <main>
        <div class="container">
            <div class="display">
                0
            </div>
            <div class="calculator">
                <button class="special">AC</button>
                <button class="special">DEL</button>
                <button class="operator">%</button>
                <button class="operator">/</button>
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button class="operator">*</button>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button class="operator">-</button>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button class="operator">+</button>
                <button class="zero">0</button>
                <button>.</button>
                <button class="equal">=</button>
            </div>
        </div>
    </main>
    <footer>
        <p>© 2026 Sami Arshad | All Rights Reserved </p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
